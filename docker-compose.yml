services:
  laukin-web:
    image: ghcr.io/gerbang-digital-nusantara/laukin-web:latest
    container_name: laukin-web-container
    ports:
      - "${APP_PORT:-3084}:4099"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4099
    volumes:
      - type: bind
        source: /home/app/laukin-images
        target: /app/Lauk.in Asset
        read_only: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4099/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
